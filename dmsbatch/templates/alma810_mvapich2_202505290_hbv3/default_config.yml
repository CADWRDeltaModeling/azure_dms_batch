location: eastus # the location of the batch account
pool_name: "{job_name}"
num_hosts: 1
vm_size: "standard_hb120rs_v3" # use any of the H series from https://learn.microsoft.com/en-us/azure/virtual-machines/sizes-hpc
study_copy_flags: "--recursive --preserve-symlinks --exclude-regex='.*outputs.*nc'"
setup_dirs_copy_flags: "--recursive --preserve-symlinks"
delete_after_mins: 240 # delete the job after this many minutes
# HBv3 MVAPICH2 tuning (benchmark: schism_mpi_timing_test_mvapich2.sh, alma810_mvapich2_202505290_hbv3 template):
# Short-run winner (1251 days): numa_bunch_ndreg — 0.1344 d/min, 632s, exit=0
# Long-run winner  (1260 days): full_combo       — 0.1286 d/min, 4853s, exit=0
# full_combo adds MV2_ENABLE_SHARP=1 to NUMA bunch + NDREG opts.
# Note: numa_bunch_ndreg and baseline both failed (exit=255) in the long run; SHARP stabilizes at scale.
# MV2_IBA_HCA is omitted (auto-detected by timing script; add -env MV2_IBA_HCA mlx5_ib0:1 if needed).
mpi_tuning_opts: "-env MV2_HOMOGENEOUS_CLUSTER 1 -env MV2_NDREG_ENTRIES_MAX 131072 -env MV2_NDREG_ENTRIES 32768 -env MV2_ENABLE_AFFINITY 1 -env MV2_CPU_BINDING_POLICY bunch -env MV2_CPU_BINDING_LEVEL core -env MV2_ENABLE_SHARP 1"
mpi_opts: --bind-to core --np {num_cores} -f hostfile {mpi_tuning_opts}
mpi_command: 'printenv; echo "define mpi_command in job config yaml file";'
task_slots_per_node: 1
# translates to pkg_resources.resource_filename('dmsbatch', 'templates/<template_name>/a>
application_command_template: 'templates/{template_name}/application_command_template.sh' 
coordination_command_template: 'templates/{template_name}/coordination_command_template.sh'
job_start_command_template: 'templates/{template_name}/job_start_command_template.sh' 
pool_bicep_resource: 'templates/{template_name}/pool.bicep' 
pool_parameters_resource: 'templates/{template_name}/pool.parameters.json'
node_type: 'TargetDedicatedNodes' # 'TargetLowPriorityNodes'
autoscale_formula: 'templates/{template_name}/autoscale_formula.txt'
created_by: '' # this is the user who created the job
app_pkgs:
- name: batch_setup
- name: nfs
- name: schism_with_deps
  version: v5.11.1_alma8.10hpc_mvapich2
- name: schimpy_with_deps
- name: baydeltaschism
- name: telegraf
- name: suxarray_with_deps